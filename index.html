<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wesmo! map</title>
    <meta
      name="description"
      content="現在地の近くにある Wesmo! 対応加盟店を地図で探せるシンプルなページ"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css?v=20260314f" />
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <p class="eyebrow">GitHub Pages MVP</p>
        <h1>WESMO!がつかえるお店・サービス マップ（一部のみ）</h1>
        <p class="lead">
          スマホの現在地から、近くの Wesmo! 対応店を地図と距離順リストで確認できます。
        </p>
        <p class="notice">
          このページは、外出先で Wesmo! 加盟店を探したい個人が作成している非公式の地図です。掲載情報は不完全または古い可能性があるため、利用前に店舗やサービス提供元の案内も確認してください。
        </p>
      </section>

      <section class="controls" aria-label="検索条件">
        <div class="category-hero" aria-label="カテゴリで探す">
          <p class="category-hero-label">カテゴリから探す</p>
          <div id="category-chip-list" class="category-chip-list"></div>
        </div>
        <form id="address-form" class="address-form">
          <label class="field address-field" for="address-input">
            <span>住所・駅名で探す</span>
            <input
              id="address-input"
              name="address"
              type="text"
              placeholder="梅田駅 / 大阪市北区梅田 など"
              autocomplete="street-address"
            />
          </label>
          <button id="address-search-button" class="secondary-button" type="submit">
            検索
          </button>
        </form>
        <button id="locate-button" class="primary-button" type="button">
          現在地を取得
        </button>
        <label class="field">
          <span>検索半径</span>
          <select id="radius-select">
            <option value="1">1km</option>
            <option value="3" selected>3km</option>
            <option value="5">5km</option>
          </select>
        </label>
        <label class="field category-select-field">
          <span>ジャンル</span>
          <select id="category-select">
            <option value="">すべて</option>
          </select>
        </label>
      </section>

      <section id="search-results-panel" class="search-results-panel hidden" aria-live="polite">
        <div class="results-header search-results-header">
          <h2>住所検索の候補</h2>
          <p id="search-result-count">0件</p>
        </div>
        <ul id="search-result-list" class="search-result-list"></ul>
      </section>

      <section class="status-panel" aria-live="polite">
        <p id="status-text">地図の中心から 3km 圏内の加盟店を表示します。</p>
      </section>

      <section class="map-section">
        <div id="map" aria-label="加盟店マップ"></div>
      </section>

      <section class="results">
        <div class="results-header">
          <h2>表示中の加盟店</h2>
          <p id="result-count">0件</p>
        </div>
        <ul id="shop-list" class="shop-list"></ul>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js?v=20260314k" type="module"></script>
  </body>
</html>
